<!DOCTYPE html>
<html>
<head>
    <title>Chat • {{ room_name }}</title>

    <style>
        /* ===== Global Reset ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            font-family: "Inter", "Segoe UI", sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== Chat Wrapper ===== */
        .chat-wrapper {
            width: 900px;
            height: 650px;
            max-width: 95%;
            background: #111827;
            border-radius: 18px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        /* ===== Sidebar (optional future users list) ===== */
        .sidebar {
            width: 220px;
            background: #0b1220;
            border-right: 1px solid #1f2937;
            padding: 20px;
        }

        .sidebar h3 {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .room-name {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            color: #e2e8f0;
            font-weight: 600;
        }

        /* ===== Main Chat Area ===== */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ===== Header ===== */
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            color: #f1f5f9;
            font-size: 18px;
        }

        .status {
            font-size: 12px;
            color: #22c55e;
        }

        /* ===== Messages ===== */
        .chat-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.2s ease-in-out;
        }

        .message.user {
            align-self: flex-end;
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            align-self: flex-start;
            background: #1f2937;
            color: #e5e7eb;
            border-bottom-left-radius: 4px;
        }

        .message .sender {
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Input ===== */
        .chat-input {
            padding: 20px;
            border-top: 1px solid #1f2937;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 10px;
            border: none;
            background: #1f2937;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .chat-input input::placeholder {
            color: #94a3b8;
        }

        .chat-input button {
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .chat-input button:hover {
            background: #1d4ed8;
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        @media(max-width: 768px) {
            .sidebar {
                display: none;
            }

            .chat-wrapper {
                height: 95vh;
            }
        }
    </style>
</head>

<body>

<div class="chat-wrapper">

    <div class="sidebar">
        <h3>ROOM</h3>
        <div class="room-name">{{ room_name }}</div>
    </div>

    <div class="chat-container">

        <div class="chat-header">
            <h2>{{ room_name }}</h2>
            <span class="status">● Online</span>
        </div>

        <div class="chat-messages" id="chat-log"></div>

        <div class="chat-input">
            <input id="chat-message-input" type="text" placeholder="Type a message..." autocomplete="off">
            <button id="chat-message-submit">Send</button>
        </div>

    </div>
</div>

<script>
    const roomName = "{{ room_name }}";
    const guestName = sessionStorage.getItem('guestName') || "Guest";

    const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';

    const chatSocket = new WebSocket(
        protocol + window.location.host + '/ws/chat/' + roomName + '/'
    );

    const chatLog = document.querySelector('#chat-log');

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const message = data.message;
        const sender = data.sender || "Anonymous";

        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        messageDiv.classList.add(sender === guestName ? 'user' : 'other');

        messageDiv.innerHTML = `
            <div class="sender">${sender}</div>
            <div>${message}</div>
        `;

        chatLog.appendChild(messageDiv);
        chatLog.scrollTop = chatLog.scrollHeight;
    };

    document.querySelector('#chat-message-submit').onclick = sendMessage;

    document.querySelector('#chat-message-input').addEventListener("keyup", function(e){
        if(e.key === "Enter") sendMessage();
    });

    function sendMessage() {
        const input = document.querySelector('#chat-message-input');
        const message = input.value.trim();

        if(message !== "") {
            chatSocket.send(JSON.stringify({
                message: message,
                sender: guestName
            }));

            input.value = "";
        }
    }
</script>

</body>
</html>
