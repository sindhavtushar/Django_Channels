<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Calculator</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f4f9; }
        #log { background: #fff; border: 1px solid #ddd; padding: 10px; height: 200px; overflow-y: scroll; margin-top: 10px; border-radius: 4px; }
        .status { font-weight: bold; color: #555; }
        .msg { margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 2px; }
    </style>
</head>
<body>

    <h2>Live Calculator Test</h2>
    <p class="status">Status: <span id="status">Connecting...</span></p>

    <div>
        <input type="text" id="calc-input" placeholder="Type data to send (e.g. 5+5)">
        <button onclick="sendData()">Send to Consumer</button>
    </div>

    <div id="log"></div>

    <script>
        // 1. Establish connection to the route you defined: /ws/livecalc/
        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const wsUrl = `${wsScheme}://${window.location.host}/ws/livecalc/`;
        const socket = new WebSocket(wsUrl);

        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');
        const inputEl = document.getElementById('calc-input');

        // Handle connection opening
        socket.onopen = () => {
            statusEl.innerText = "Connected";
            statusEl.style.color = "green";
        };

        // 2. Handle data received from your 'receive' and 'connect' methods
        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            console.log("Server says:", data);
            
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerText = `Received: ${JSON.stringify(data)}`;
            logEl.prepend(div);
        };

        // Handle errors and closing
        socket.onclose = () => {
            statusEl.innerText = "Disconnected";
            statusEl.style.color = "red";
        };

        // 3. Send data to the consumer's 'receive' method
        function sendData() {
            const val = inputEl.value;
            if (val) {
                // Sending JSON as your consumer uses json.loads(text_data)
                socket.send(JSON.stringify({ "expression": val }));
                inputEl.value = '';
            }
        }
    </script>
</body>
</html>
